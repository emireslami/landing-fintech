<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#121212">
  <title>داشبورد مدیریت | VibeBuilders</title>
  <style>
    :root{color-scheme:dark;--bg:#121212;--surface:#1e1e1e;--surface2:#252525;--primary:#90caf9;--main:#42a5f5;--text:rgba(255,255,255,.87);--muted:rgba(255,255,255,.6);--border:rgba(255,255,255,.12);--success:#66bb6a;--danger:#ef5350;--warning:#ffb74d}
    *{box-sizing:border-box}html{font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}body{margin:0;min-height:100vh;background:radial-gradient(circle at 85% 0,rgba(66,165,245,.1),transparent 35%),var(--bg)}button,input,select{font:inherit}.hidden{display:none!important}
    .login-shell{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(420px,100%);padding:32px;border:1px solid var(--border);border-radius:16px;background:var(--surface);box-shadow:0 20px 55px rgba(0,0,0,.35)}.brand{display:flex;align-items:center;gap:10px;margin-bottom:30px;font-weight:700;direction:ltr}.mark{width:36px;height:36px;display:grid;place-items:center;border-radius:50%;background:var(--main);color:#07131d}.login-card h1{margin:0 0 8px;font-size:1.45rem}.login-card p{margin:0 0 24px;color:var(--muted);font-size:.85rem;line-height:1.8}.field{display:grid;gap:8px;margin-bottom:16px}.field label{font-size:.78rem}.field input{width:100%;height:48px;padding:0 14px;border:1px solid var(--border);border-radius:9px;background:#171717;color:var(--text);outline:none;direction:ltr;text-align:left}.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(144,202,249,.1)}
    .btn{min-height:44px;padding:8px 16px;border:0;border-radius:9px;cursor:pointer;font-weight:700}.btn:disabled{opacity:.55;cursor:wait}.btn-primary{width:100%;background:var(--main);color:#07131d}.error{min-height:24px;margin:12px 0 0!important;color:#ff8a9b!important;font-size:.76rem!important}
    .app{min-height:100vh}.topbar{position:sticky;top:0;z-index:5;border-bottom:1px solid var(--border);background:rgba(18,18,18,.9);backdrop-filter:blur(16px)}.topbar-inner{width:min(1180px,calc(100% - 32px));min-height:70px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:16px}.top-actions{display:flex;gap:8px}.btn-ghost{border:1px solid var(--border);background:transparent;color:var(--text)}.container{width:min(1180px,calc(100% - 32px));margin:36px auto 70px}.page-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:24px}.page-head h1{margin:0 0 8px;font-size:1.8rem}.page-head p{margin:0;color:var(--muted);font-size:.85rem}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}.metric{padding:18px;border:1px solid var(--border);border-radius:12px;background:var(--surface)}.metric span{display:block;color:var(--muted);font-size:.75rem}.metric strong{display:block;margin-top:10px;color:var(--primary);font-size:1.5rem}.tools{display:flex;gap:10px;margin-bottom:14px}.search{flex:1;height:44px;padding:0 14px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);outline:none}.filter{height:44px;padding:0 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text)}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:14px 12px;border-bottom:1px solid var(--border);text-align:right;font-size:.78rem;white-space:nowrap}th{color:var(--muted);font-weight:400;background:rgba(255,255,255,.02)}tbody tr:hover{background:rgba(255,255,255,.025)}tbody tr:last-child td{border-bottom:0}.phone{direction:ltr;text-align:right;font-family:monospace;font-size:.88rem}.status{min-width:110px;height:34px;padding:0 8px;border:1px solid var(--border);border-radius:7px;background:#181818;color:var(--text)}.resume{min-height:34px;padding:4px 10px;border:1px solid rgba(144,202,249,.3);border-radius:7px;background:rgba(144,202,249,.07);color:var(--primary);cursor:pointer}.empty{padding:52px 20px;text-align:center;color:var(--muted)}.toast{position:fixed;left:22px;bottom:22px;z-index:10;padding:12px 16px;border-radius:9px;background:#263238;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.35);font-size:.8rem}
    @media(max-width:760px){.metrics{grid-template-columns:repeat(2,1fr)}.page-head{align-items:start;flex-direction:column}.tools{flex-direction:column}.container{margin-top:24px}.login-card{padding:24px}}
  </style>
</head>
<body>
  <main class="login-shell" id="loginView">
    <form class="login-card" id="loginForm">
      <div class="brand"><span class="mark">V</span><span>VibeBuilders Management</span></div>
      <h1>ورود به داشبورد</h1><p>این بخش فقط برای مدیر سامانه در دسترس است.</p>
      <div class="field"><label for="username">نام کاربری</label><input id="username" autocomplete="username" required></div>
      <div class="field"><label for="password">رمز عبور</label><input id="password" type="password" autocomplete="current-password" required></div>
      <button class="btn btn-primary" id="loginButton">ورود امن</button><p class="error" id="loginError" role="alert"></p>
    </form>
  </main>

  <main class="app hidden" id="dashboardView">
    <header class="topbar"><div class="topbar-inner"><div class="brand" style="margin:0"><span class="mark">V</span><span>VibeBuilders</span></div><div class="top-actions"><button class="btn btn-ghost" id="refreshButton">به‌روزرسانی</button><button class="btn btn-ghost" id="logoutButton">خروج</button></div></div></header>
    <div class="container">
      <div class="page-head"><div><h1>درخواست‌های حضور</h1><p>فهرست متقاضیان بوت‌کمپ مدیریت محصول فین‌تک</p></div><span id="lastUpdate"></span></div>
      <section class="metrics"><article class="metric"><span>همه درخواست‌ها</span><strong id="allCount">۰</strong></article><article class="metric"><span>در انتظار بررسی</span><strong id="pendingCount">۰</strong></article><article class="metric"><span>تماس گرفته‌شده</span><strong id="contactedCount">۰</strong></article><article class="metric"><span>پذیرفته‌شده</span><strong id="acceptedCount">۰</strong></article></section>
      <div class="tools"><input class="search" id="searchInput" type="search" placeholder="جست‌وجوی نام یا شماره موبایل…"><select class="filter" id="statusFilter"><option value="">همه وضعیت‌ها</option><option value="pending">در انتظار بررسی</option><option value="contacted">تماس گرفته‌شده</option><option value="accepted">پذیرفته‌شده</option><option value="rejected">ردشده</option></select></div>
      <div class="table-wrap"><table><thead><tr><th>نام متقاضی</th><th>شماره موبایل</th><th>تاریخ ثبت</th><th>رزومه</th><th>وضعیت</th></tr></thead><tbody id="applicationsBody"></tbody></table><div class="empty hidden" id="emptyState">درخواستی برای نمایش وجود ندارد.</div></div>
    </div>
  </main>
  <div class="toast hidden" id="toast" role="status"></div>
  <script>
    const API='https://cglqkjfqwxhckjinuhhl.supabase.co/functions/v1/admin-dashboard';
    const fa=n=>new Intl.NumberFormat('fa-IR').format(n); const faDate=value=>new Intl.DateTimeFormat('fa-IR',{dateStyle:'medium',timeStyle:'short'}).format(new Date(value));
    const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const labels={pending:'در انتظار بررسی',contacted:'تماس گرفته‌شده',accepted:'پذیرفته‌شده',rejected:'ردشده'};
    let token=sessionStorage.getItem('vb_admin_token')||'',applications=[];
    const loginView=document.querySelector('#loginView'),dashboardView=document.querySelector('#dashboardView'),tbody=document.querySelector('#applicationsBody'),empty=document.querySelector('#emptyState');
    const request=async(action,options={})=>{const response=await fetch(`${API}?action=${action}`,{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})}});const data=await response.json().catch(()=>({}));if(!response.ok){if(response.status===401&&action!=='login')logout();throw new Error(data.message||'ارتباط با سرور ناموفق بود.')}return data};
    const toast=message=>{const el=document.querySelector('#toast');el.textContent=message;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),2400)};
    const logout=()=>{token='';sessionStorage.removeItem('vb_admin_token');dashboardView.classList.add('hidden');loginView.classList.remove('hidden')};
    const render=()=>{const q=document.querySelector('#searchInput').value.trim();const status=document.querySelector('#statusFilter').value;const rows=applications.filter(item=>(!status||item.status===status)&&(!q||`${item.first_name} ${item.last_name} ${item.phone}`.includes(q)));tbody.innerHTML=rows.map(item=>`<tr><td><strong>${escapeHtml(item.first_name)} ${escapeHtml(item.last_name)}</strong></td><td class="phone">${escapeHtml(item.phone)}</td><td>${faDate(item.created_at)}</td><td>${item.resume_path?`<button class="resume" data-resume="${escapeHtml(item.resume_path)}">مشاهده PDF</button>`:'—'}</td><td><select class="status" data-id="${item.id}">${Object.entries(labels).map(([value,label])=>`<option value="${value}" ${item.status===value?'selected':''}>${label}</option>`).join('')}</select></td></tr>`).join('');empty.classList.toggle('hidden',rows.length>0);document.querySelector('#allCount').textContent=fa(applications.length);document.querySelector('#pendingCount').textContent=fa(applications.filter(x=>x.status==='pending').length);document.querySelector('#contactedCount').textContent=fa(applications.filter(x=>x.status==='contacted').length);document.querySelector('#acceptedCount').textContent=fa(applications.filter(x=>x.status==='accepted').length)};
    const load=async()=>{document.querySelector('#refreshButton').disabled=true;try{applications=await request('applications');render();document.querySelector('#lastUpdate').textContent=`آخرین به‌روزرسانی: ${faDate(new Date())}`}catch(error){toast(error.message)}finally{document.querySelector('#refreshButton').disabled=false}};
    document.querySelector('#loginForm').addEventListener('submit',async event=>{event.preventDefault();const button=document.querySelector('#loginButton'),error=document.querySelector('#loginError');button.disabled=true;error.textContent='';try{const result=await request('login',{method:'POST',body:JSON.stringify({username:document.querySelector('#username').value.trim(),password:document.querySelector('#password').value})});token=result.token;sessionStorage.setItem('vb_admin_token',token);loginView.classList.add('hidden');dashboardView.classList.remove('hidden');document.querySelector('#password').value='';await load()}catch(err){error.textContent=err.message}finally{button.disabled=false}});
    tbody.addEventListener('change',async event=>{const select=event.target.closest('.status');if(!select)return;select.disabled=true;try{await request('status',{method:'PATCH',body:JSON.stringify({id:select.dataset.id,status:select.value})});const item=applications.find(x=>x.id===select.dataset.id);if(item)item.status=select.value;render();toast('وضعیت به‌روزرسانی شد.')}catch(error){toast(error.message);await load()}});
    tbody.addEventListener('click',async event=>{const button=event.target.closest('[data-resume]');if(!button)return;button.disabled=true;try{const result=await request('resume',{method:'POST',body:JSON.stringify({path:button.dataset.resume})});window.open(result.url,'_blank','noopener')}catch(error){toast(error.message)}finally{button.disabled=false}});
    document.querySelector('#searchInput').addEventListener('input',render);document.querySelector('#statusFilter').addEventListener('change',render);document.querySelector('#refreshButton').addEventListener('click',load);document.querySelector('#logoutButton').addEventListener('click',logout);
    if(token){loginView.classList.add('hidden');dashboardView.classList.remove('hidden');load()}
  </script>
</body>
</html>
